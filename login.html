<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="login-page">
    <div class="container-fluid min-vh-100 ">
  <div class="row min-vh-100">

    
    <div class="col-lg-6 d-none d-lg-flex left-panel align-items-center text-center  justify-content-center">
      <div class="px-5 w-90">
        <div class="brand mb-3"> <img src="Dark.png" alt="" class="logo" class="img-fluid"></div>
        <p class="opacity-75">
          Lorem Ipsum is simply dummy text of the printing
 and typesetting industry. Lorem Ipsum has been
 the industry's standard dummy 
        </p>
      </div>
    </div>

   
    <div class="col-lg-5 d-flex align-items-center justify-content-center">
      <div class="card login-card shadow-sm p-4">
        <h5 class="mb-1">Hello Again!</h5>
        <p class="text-muted mb-4">Welcome back</p>

        <form  id="loginForm">
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email address" required>
          </div>

          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password"required>
          </div>

          
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
         
     

          <div class="text-center">
            <a href="signup.html" class="small text-decoration-none">
              Forgot password?
            </a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
</div>
<script src="auth.js"></script>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault(); // Page ko automatic refresh hone se rokein

    // 1. User jo input fields mein likhega, yeh unhe pakdega
    const emailInput = document.querySelector('input[type="email"]').value;
    const passwordInput = document.querySelector('input[type="password"]').value;

    // 2. YAHAN AAP APNA DUMMY EMAIL AUR PASSWORD BADAL SAKTE HAIN
    const sahiEmail = "admin@gmail.com";
    const sahiPassword = "admin123";

    // 3. Ab dono ko match karte hain
    if (emailInput === sahiEmail && passwordInput === sahiPassword) {
        alert("Login Successful! Welcome to ShopHub Dashboard.");
        window.location.href = "index.html"; // Sahi hone par dashboard par bhej do
    } else {
        alert("Galat Details! Sahi credentials yeh hain:\nEmail: admin@gmail.com\nPassword: admin123");
    }
});
</script>
</body>
</html>
