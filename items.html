<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Add Items</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="d-flex">
    <aside class="sidebar  ">
      <img src="Dark.png" alt="" class="logo" class="img-fluid">
      <div class="side-nav  d-flex justify-content-between flex-column h-100 mt-5">
        <ul class="nav flex-column ">
          <li class="nav-item "><a class="nav-link active gap-10 gap-2 d-flex align-items-center" href="#"> <i
                class="bi bi-speedometer2"></i> Dashboard</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"><i
                class="bi bi-people"></i>USERS</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"><i
                class="bi bi-bag-check"></i>order</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"> <i
                class="bi bi-graph-up"></i>Sales Report</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"> <i
                class="bi bi-box-seam"></i>Products</a></li>
        </ul>

        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"> <i
                class="bi bi-envelope"></i>Contact Us</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center" href="#"><i
                class="bi bi-question-circle"></i>Contact Us</a></li>
          <li class="nav-item"><a class="nav-link  gap-10 gap-2 d-flex align-items-center text-danger"
              href="signup.html"><i class="bi bi-box-arrow-right text-danger"></i>Sign Out</a></li>
        </ul>
      </div>
    </aside>
    <div class="form-card">
      <h5 class="text-center fw-bold mb-4">ADD ITEMS</h5>

      <!-- Radio Buttons -->
      <div class="d-flex justify-content-center gap-4 mb-4">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="type" checked>
          <label class="form-check-label">Active</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="type">
          <label class="form-check-label">HS</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="type">
          <label class="form-check-label">Service</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="type">
          <label class="form-check-label">Product</label>
        </div>
      </div>

      <!-- Form -->
      <form>
        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Item name</label>
            <input type="text" class="form-control" placeholder="Enter item name">
          </div>

          <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" placeholder="Enter description">
          </div>

          <div class="col-md-6">
            <label class="form-label">Category</label>
            <select class="form-select">
              <option selected>Select category</option>
              <option>Category 1</option>
              <option>Category 2</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">HS Code</label>
            <select class="form-select">
              <option selected>Select HS code</option>
              <option>8432.100</option>
              <option>8432.200</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Revenue Account</label>
            <select class="form-select">
              <option selected>Select account</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Expense Account</label>
            <select class="form-select">
              <option selected>Select account</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Asset Account</label>
            <select class="form-select">
              <option selected>Select account</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Income Account</label>
            <select class="form-select">
              <option selected>Select account</option>
            </select>
          </div>

          <!-- Upload -->
          <div class="col-12">
            <label class="form-label">Upload Image</label>

            <div class="upload-box">
              <i class="bi bi-image fs-3"></i>
            </div>
          </div>
          <div class="col-12">
              
              <input type="file">
            

          </div>

          <!-- Submit -->
          <div class="col-12 mt-4">
            <button type="submit" class="btn submit-btn w-100">
              SUBMIT
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>

</body>

</html>
